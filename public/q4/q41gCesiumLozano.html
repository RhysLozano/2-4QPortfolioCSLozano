<!DOCTYPE html>
    <html>
        <head>
        <meta charset="UTF-8">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
        <title>Add / Update a Movie Rating</title>

        <style>
            body{
            font-family: "Poppins", sans-serif;
            background :#fea1ba;
            display:flex;
            justify-content:center;
            padding:40px;

        }

            .container{
            background:white;
            padding:20px;
            width:350px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

            input,select{
            width:100%;
            padding:8px;
            margin-bottom:10px;
            border-radius:5px;
            border:1px solid #ccc;
        }

            button{
            width:100%;
            padding:10px;
            background:#fb8282;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }      

            button:hover{
            background:#fb8282;
        }


            .stars span{
            font-size:22px;
            cursor:pointer;
            color:#ccc;
        }


            .stars .active{
            color:#fdff76;
        }


            .movie{
            background:#f7f7f7;
            padding:8px;
            margin-top:10px;
            border-radius:5px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

            .deleteBtn{
            background:#ddd;
            border:none;
            padding:3px 8px;
            border-radius:4px;
            cursor:pointer;
        }

            </style>

        </head>
    <body>
        <div class="container">
        <h2> .  ݁₊  ⊹  Movie  Rating .  📽  .ᐟ  </h2>
        <label>Title :</label>
            <input id="title"required>
        <label>Year :</label>
            <input id="year"required>
        <label>Genre :</label>
            <select id="genre" required>
        <option>Adventure</option>
        <option>Action</option>
        <option>Comedy</option>
        <option>Drama</option>
        <option>Fantasy</option>
        <option>Horror</option>
        <option>Musical</option>
        <option>Romance</option>
        <option>Sci-Fi</option>
    </select>

    <label>[ ▸ ] Rating:</label>

        <div class="stars" id="stars">
        <span data-value="1">★</span>
        <span data-value="2">★</span>
        <span data-value="3">★</span>
        <span data-value="4">★</span>
        <span data-value="5">★</span>
    </div>

    <br><br>
    <button onclick="addMovie()">Add Movie</button>
    <h3>Movie List</h3>
    <div id="movieList"></div>
    </div>

    <script>

    let rating = 0;
        const stars = document.querySelectorAll("#stars span");
        stars.forEach(star=>{
        star.addEventListener("click",function(){
        rating = this.dataset.value;
        stars.forEach(s=>s.classList.remove("active"));


        for(let i=0;i<rating;i++){
        stars[i].classList.add("active");
        }


        });
        });

    function addMovie(){

        const title = document.getElementById("title").value;
        const year = document.getElementById("year").value;
        const genre = document.getElementById("genre").value;

        if(title === "" || year === "" || genre === "" || rating === 0){
        alert("Please fill in all fields and select a rating.");
        return;
        }

    let movies = JSON.parse(localStorage.getItem("movies")) || [];
    let existingMovie = movies.find(movie => movie.title === title);
        if(existingMovie){

    let newAverage = Math.round(
        (parseInt(existingMovie.rating) + parseInt(rating)) / 2
    );

    existingMovie.rating = newAverage;
    existingMovie.year = year;
    existingMovie.genre = genre;

    }

    else{
        movies.push({
        title: title,
        year: year,
        genre: genre,
        rating: rating
    });

    }
    localStorage.setItem("movies", JSON.stringify(movies));
        displayMovies();
    }

    document.getElementById("title").value="";
    document.getElementById("year").value="";
        rating=0;
        stars.forEach(s=>s.classList.remove("active"));

    function deleteMovie(index){
        if(confirm("Delete...?")){
        let movies = JSON.parse(localStorage.getItem("movies")) || [];
        movies.splice(index,1);
        localStorage.setItem("movies",JSON.stringify(movies));
        displayMovies();

    }

    }


    function displayMovies(){
        let movies = JSON.parse(localStorage.getItem("movies")) || [];
        const list=document.getElementById("movieList");
        list.innerHTML="";
        movies.forEach((m,index)=>{

        let starsDisplay="";

    for(let i=0;i<m.rating;i++){
        starsDisplay+="★";
    }

        const div=document.createElement("div");
        div.className="movie";

        div.innerHTML=`
        <span>
        ${m.title} (${m.year}) - ${m.genre}, Rating: ${starsDisplay}
        </span>
        <button class="deleteBtn" onclick="deleteMovie(${index})">Delete</button>`;

        list.appendChild(div);

    });

    }

    displayMovies();

</script>

</body>
</html>
